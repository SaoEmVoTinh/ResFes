<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | FPT Networking</title>
    <link rel="icon" type="image/png" href="fpt-logo2.png">
    <link rel="stylesheet" href="style3.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="theme-controller.js"></script>
    <style>
    #theme-toggle{display:none!important;}
    body{padding-left:240px;padding-top:60px;margin:0;}
    @media(max-width:900px){body{padding-left:0;}}
    .error-page{
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        min-height:calc(100vh - 60px);text-align:center;padding:40px 20px;
    }
    .error-code{
        font-size:120px;font-weight:800;line-height:1;
        background:linear-gradient(135deg,var(--fpt-orange),var(--fpt-blue));
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        background-clip:text;
    }
    .error-title{font-size:24px;font-weight:700;color:var(--text-main);margin:8px 0;}
    .error-desc{font-size:15px;color:var(--text-sub);margin-bottom:32px;max-width:400px;}
    .error-btn{
        display:inline-flex;align-items:center;gap:8px;
        padding:12px 28px;border-radius:12px;
        background:linear-gradient(135deg,var(--fpt-orange),var(--fpt-orange-light));
        color:white;font-weight:600;font-size:15px;text-decoration:none;
        transition:opacity .2s;
    }
    .error-btn:hover{opacity:.85;}
    </style>
</head>
<body>
<!-- SIDEBAR OVERLAY -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside id="sidebar">
    <div class="sidebar-logo" onclick="window.location.href='index.html'" style="cursor:pointer">
        <img src="fpt-logo2.png" alt="FPT">
        <div class="sidebar-logo-text"><h2>FPT Networking</h2><p>Kết nối · Hỗ trợ · Chia sẻ</p></div>
    </div>
    <nav class="sidebar-nav">
                <div class="sidebar-label">Khám phá</div>
        <a href="index.html" class="sidebar-item"><i class="bx bxs-home"></i> Trang chủ</a>
        <a href="search.html" class="sidebar-item"><i class="bx bx-search-alt"></i> Hỏi & Đáp</a>
        <a href="clubs.html" class="sidebar-item"><i class="bx bxs-group"></i> Câu lạc bộ</a>
        <a href="skills.html" class="sidebar-item"><i class="bx bxs-book-open"></i> Kỹ năng & Tài liệu</a>
        <a href="projects.html" class="sidebar-item"><i class="bx bxs-photo-album"></i> Dự án & Sự kiện</a>
        <a href="locations.html" class="sidebar-item"><i class="bx bxs-map-alt"></i> Tìm địa điểm</a>
        <a href="feedback.html" class="sidebar-item"><i class="bx bxs-edit"></i> Góp ý & Liên hệ</a>
        <a href="sotay.html" class="sidebar-item"><i class="bx bxs-book-content"></i> Sổ Tay Sinh Viên</a>
</nav>
    <div class="sidebar-footer">
        <button class="sidebar-item" onclick="toggleTheme()">
            <i class="bx bx-moon" id="sidebar-theme-icon"></i>
            <span id="sidebar-theme-label">Chế độ tối</span>
        </button>
    </div>
</aside>
<div id="topbar">
    <button id="hamburger" onclick="toggleSidebar()"><i class="bx bx-menu"></i></button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <img src="campus_dn.png" alt="Campus" class="topbar-campus-img">
    </div>
</div>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}
function syncSidebarTheme(){var d=document.body.classList.contains('dark-mode');var i=document.getElementById('sidebar-theme-icon');var l=document.getElementById('sidebar-theme-label');if(i)i.className=d?'bx bx-sun':'bx bx-moon';if(l)l.textContent=d?'Chế độ sáng':'Chế độ tối';}
var _orig=window.toggleTheme;window.toggleTheme=function(){if(_orig)_orig();syncSidebarTheme();};
document.addEventListener('DOMContentLoaded',syncSidebarTheme);
</script>

<div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Trang không tồn tại</h1>
    <p class="error-desc">Trang bạn đang tìm không tồn tại hoặc đã bị xóa. Hãy quay lại trang chủ nhé!</p>
    <a href="index.html" class="error-btn"><i class="bx bxs-home"></i> Về trang chủ</a>
</div>

<!-- BACK TO TOP -->
<button id="back-to-top" title="Lên đầu trang" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class='bx bx-chevron-up'></i>
</button>
<script>
(function(){
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  window.addEventListener('scroll', function(){
    if (window.scrollY > 300) btn.classList.add('visible');
    else btn.classList.remove('visible');
  }, { passive: true });
})();
</script>
</body>
</html>
